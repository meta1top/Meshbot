packages:
  - apps/*
  - libs/*
  - packages/*

# pnpm 11 起 verify-deps-before-run 等设置从 .npmrc 迁到这里（.npmrc 里的同名项已失效）。
# 关掉「跑命令前校验依赖、失配就自动 install」：desktop 打包链路里 pnpm deploy 会改动
# node_modules mtime，触发误判，进而想 purge+install，非 TTY 下直接 ERR_PNPM_ABORTED_
# REMOVE_MODULES_DIR_NO_TTY 中断整个构建。
verifyDepsBeforeRun: false

# 强制 hoisted 扁平 node_modules（同样从 .npmrc 迁来——pnpm 11 不再读 .npmrc 的 node-linker）。
# 必须 hoisted：默认 isolated 下 @nestjs/core 的 peer 变体会分裂成两份物理副本，
# server-agent 与 libs/common 各拿一份，NestJS ModulesContainer 跨副本身份不匹配，
# DiscoveryService 注入直接崩。hoisted 把 @nestjs/core 提到 root 单副本共享，规避此问题。
nodeLinker: hoisted

overrides:
  '@types/node': ^22
  '@langchain/langgraph-checkpoint': ~0.0.18
  # 统一 better-sqlite3 到 12.x：@langchain/langgraph-checkpoint-sqlite 固定 ^11.7.0，
  # 但 11.x 的原生源码编译不过 Electron 41 的 v8 头（桌面打包 electron-rebuild 报 6 个
  # 编译错误）。12.x 对 checkpointer 用到的 API 兼容且能编到 Electron ABI，避免树里
  # 同时存在两个版本、其中老版本打包时崩。
  better-sqlite3: ^12.9.0
  # NativeWind v5 用 lightningcss 解析 apps/mobile/global.css；新版 lightningcss
  # 解析该文件会报 "failed to deserialize; expected an object-like struct named
  # Specifier" (NativeWind v5 官方文档已知问题)，钉 1.30.1 规避。
  lightningcss: 1.30.1

peerDependencyRules:
  ignoreMissing:
    - dotenv
  allowedVersions:
    "@nestjs/core": "11"
    "@nestjs/common": "11"
    "@nestjs/typeorm": "11"
    "reflect-metadata": "*"

allowBuilds:
  # postinstall 跑 select-version（按本机 TS 版本选编译产物），必须放行
  '@alicloud/openapi-core': true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@swc/core': true
  bcrypt: true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true
  unrs-resolver: true
