packages:
  - apps/*
  - libs/*
  - packages/*

overrides:
  '@types/node': ^22

peerDependencyRules:
  ignoreMissing:
    - dotenv
  allowedVersions:
    "@nestjs/core": "11"
    "@nestjs/common": "11"
    "@nestjs/typeorm": "11"
    "reflect-metadata": "*"

allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': true
  '@scarf/scarf': true
  '@swc/core': true
  bcrypt: true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  sharp: true
  unrs-resolver: true
