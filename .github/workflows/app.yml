name: App (desktop · mac)

# 触发方式：
# - workflow_dispatch：Actions 页手动 "Run workflow"（当前主用方式，npm 发布暂未启用）。
# - tag push：启用 npm 发布（npm.yml）后会推 `@meshbot/desktop@<version>` tag 自动触发；
#   旧 `app@*` 短 tag 保留作兼容。
on:
  workflow_dispatch:
  push:
    tags:
      - "@meshbot/desktop@*"
      - "app@*"

concurrency:
  group: app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          # mac arm64 → dmg arm64
          - os: macos-14
            pkg: pkg:app
          # mac x64 → dmg x64（独立 Intel runner，原生模块在原生 arch 上 rebuild 最稳）
          # macos-13 已于 2025-12 被 GitHub 退役，换用标准层 Intel runner macos-15-intel
          - os: macos-15-intel
            pkg: pkg:app

    runs-on: ${{ matrix.os }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package (${{ matrix.pkg }})
        run: pnpm run ${{ matrix.pkg }}
        env:
          # 证书（.p12 base64）+ 密码：electron-builder 读 CSC_LINK / CSC_KEY_PASSWORD 做签名。
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # 公证（notarize: true 时由 @electron/notarize 读这三个）。
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Stage distributables (exclude unpacked */MeshBot.app etc.)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload
          find apps/desktop/release -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.appimage' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest*.yml' \) -exec cp {} upload/ ';'
          if [[ ! "$(find upload -type f | head -1)" ]]; then
            echo "No distributable files staged; listing release/:"
            ls -la apps/desktop/release/ || true
            exit 1
          fi
          ls -lh upload/

      - uses: actions/upload-artifact@v4
        with:
          name: meshbot-desktop-${{ matrix.os }}
          path: upload/
          if-no-files-found: error

      # Tag-driven trigger 自动附到 GitHub Release（changesets/action 已创建过 release，
      # 这里追加 artifact 到同一 release）
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: upload/*
          fail_on_unmatched_files: false
