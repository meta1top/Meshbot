# meshbot 生产形态 docker-compose 编排 —— Phase 4 Track C3。
#
# 用法（在 repo root）：
#   cp infra/prod/.env.prod.example infra/prod/.env.prod
#   # 改 .env.prod 里的 secret
#   docker compose -f infra/prod/docker-compose.prod.yml --env-file infra/prod/.env.prod up -d
#
# 数据库迁移：
#   docker compose -f infra/prod/docker-compose.prod.yml exec server-main \
#     node -e "console.log('迁移在容器启动时手动跑，见 README')"
#   # 推荐：用 pnpm migration:run:main 在 build 节点上跑（CI 流水线），
#   # 或在 docker-compose 加 init container（Phase 5+）

services:
  postgres:
    image: postgres:16-alpine
    container_name: meshbot-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 默认不暴露端口（仅容器网络内部访问）；如需 host 调试取消注释
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: meshbot-prod-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # ports:
    #   - "6379:6379"

  server-main:
    build:
      context: ../..
      dockerfile: apps/server-main/Dockerfile
    container_name: meshbot-prod-server-main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3200
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-7d}
    ports:
      - "${SERVER_MAIN_PORT:-3200}:3200"

volumes:
  postgres-data:
  redis-data:
