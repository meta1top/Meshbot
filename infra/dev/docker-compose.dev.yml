# meshbot 本地开发依赖（Postgres + Redis）。
# - 启停：`pnpm dev:db:up` / `pnpm dev:db:down` / `pnpm dev:db:reset`
# - 日志：`pnpm dev:db:logs`
# - server-main 默认 DATABASE_URL：postgresql://meshbot:meshbot@localhost:5432/meshbot_main
# - server-main 可选 REDIS_URL：redis://localhost:6379（不填走 memory 兜底）
# 详见 infra/dev/README.md
services:
  postgres:
    image: postgres:16-alpine
    container_name: meshbot-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meshbot
      POSTGRES_PASSWORD: meshbot
      POSTGRES_DB: meshbot_main
    ports:
      - "5432:5432"
    volumes:
      - meshbot-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshbot -d meshbot_main"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meshbot-dev-redis
    restart: unless-stopped
    ports:
      # 宿主映射 6380（避免与本机其它项目的 redis 6379 冲突）；容器内仍 6379
      - "6380:6379"
    volumes:
      - meshbot-dev-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  meshbot-dev-postgres-data:
  meshbot-dev-redis-data:
