appId: com.anybot.desktop
productName: Anybot
directories:
  output: release
files:
  - dist/**/*
extraResources:
  - from: ../server-agent/.bundle/
    to: server-agent/
    filter:
      - "**/*"
  - from: ../web-agent/out/
    to: web-agent/
    filter:
      - "**/*"
mac:
  target:
    - dmg
win:
  target:
    - nsis
nsis:
  compression: zlib
afterPack: ./scripts/after-pack.js
linux:
  target:
    - AppImage
