appId: com.anybot.desktop
productName: Anybot
directories:
  output: release
files:
  - dist/**/*
extraResources:
  - from: ../server-agent/.bundle/
    to: server-agent/
    filter:
      - "**/*"
  - from: ../web-agent/out/
    to: web-agent/
    filter:
      - "**/*"
mac:
  target:
    - dmg
    - zip
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  files:
    - "!chrome-sandbox"
